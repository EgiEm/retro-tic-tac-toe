<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Tic-Tac-Toe</title>
    <meta name="description" content="A futuristic, neon-glowing Cyberpunk Tic-Tac-Toe game based on Egi's theme, featuring audio synthesis and a smart AI mode.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080810'/><path d='M8 8l16 16M24 8L8 24' stroke='%2300f2fe' stroke-width='4' stroke-linecap='round'/></svg>">
</head>
<body>
    <div id="game-container">
        <!-- ============ START SCREEN ============ -->
        <div id="start-screen" class="overlay">
            <h1 class="neon-text-title">RETRO TIC-TAC-TOE</h1>
            <p class="subtitle">SELECT GAME PROTOCOL</p>
            <div class="menu-buttons">
                <button class="neon-btn cyan-btn" id="btn-vs-ai" data-mode="ai">
                    <span class="btn-glitch">VS SYSTEM AI</span>
                </button>
                <button class="neon-btn pink-btn" id="btn-pvp" data-mode="pvp">
                    <span class="btn-glitch">LOCAL 2 PLAYERS</span>
                </button>
            </div>
            <div class="glow-decorations">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </div>
        </div>

        <!-- ============ GAMEPLAY HUD ============ -->
        <header id="hud" class="hidden">
            <div class="hud-left">
                <button id="btn-back-menu" class="hud-btn" title="Exit Game">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                </button>
            </div>
            <div id="turn-indicator">
                <span class="turn-label">CURRENT TURN</span>
                <div id="active-turn" class="cyan-turn">PLAYER X</div>
            </div>
            <div class="hud-right">
                <button id="btn-toggle-sound" class="hud-btn" title="Toggle Sound">
                    <svg id="sound-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
            </div>
        </header>

        <!-- ============ SCOREBOARD ============ -->
        <section id="scoreboard" class="hidden">
            <div class="score-card cyan-glow">
                <span class="score-name">PLAYER X</span>
                <span class="score-val" id="score-x">0</span>
                <div class="match-dots" id="dots-x">
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
            <div class="score-card draw-glow">
                <span class="score-name">TIES</span>
                <span class="score-val" id="score-ties">0</span>
            </div>
            <div class="score-card pink-glow">
                <span class="score-name" id="player-o-name">SYSTEM AI</span>
                <span class="score-val" id="score-o">0</span>
                <div class="match-dots" id="dots-o">
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </section>

        <!-- ============ PLAY BOARD ============ -->
        <main id="board-wrap" class="hidden">
            <div id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
                
                <!-- SVG Win Line Overlay -->
                <svg id="win-line-svg" viewBox="0 0 300 300">
                    <line id="win-line" x1="0" y1="0" x2="0" y2="0" stroke-linecap="round" />
                </svg>
            </div>
        </main>

        <!-- ============ ROUND RESULT OVERLAY ============ -->
        <div id="result-screen" class="overlay hidden">
            <h2 id="result-message" class="neon-text-title">PLAYER X WINS</h2>
            <p class="subtitle">ROUND CONCLUDED</p>
            <div class="result-buttons">
                <button class="neon-btn cyan-btn" id="btn-next-round">
                    <span>NEXT ROUND</span>
                </button>
                <button class="neon-btn secondary-btn" id="btn-reset-scores">
                    <span>RESET SCORES</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
